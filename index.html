<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainStormingSystem</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./assets/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4 page-wrap">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="text-center mb-4">
          <h1 class="fw-bold">BrainStormingSystem</h1>
          <p class="text-muted mb-0">GitHub Pages + Supabase 版腦力激盪討論系統</p>
        </div>

        <div class="card shadow-sm mb-4">
          <div class="card-body p-4">
            <h2 class="h4 mb-3">發起新討論</h2>
            <p class="text-muted">教師按下按鈕後，系統將建立一個新的討論區，並產生 4 位數討論代碼。</p>
            <button id="btnCreateDiscussion" class="btn btn-primary btn-lg">發起新討論</button>
            <div id="createMessage" class="mt-3"></div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h2 class="h4 mb-3">加入討論</h2>
            <div class="mb-3">
              <label for="joinCode" class="form-label">4位數討論區編號</label>
              <input type="text" id="joinCode" class="form-control" maxlength="4" inputmode="numeric" placeholder="例如 4821">
            </div>
            <div class="mb-3">
              <label for="nickname" class="form-label">暱稱</label>
              <input type="text" id="nickname" class="form-control" maxlength="50" placeholder="請輸入暱稱">
            </div>
            <button id="btnJoinDiscussion" class="btn btn-success btn-lg">加入討論</button>
            <div id="joinMessage" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./assets/js/index.js"></script>
</body>
</html>
